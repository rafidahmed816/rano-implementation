defaults:
  - _self_

# Model
mel_channels: 80
embed_dim: 256
num_cinn_blocks: 12      # §2.2: N_inn = 12
num_acg_blocks: 8        # §2.1: N_acg = 8
hidden: 512

# Loss
lambda1: 1.0
lambda2: 5.0
margin: 0.3
acg_tau: 0.5

# Data
vctk_root: null
libritts_root: data
libritts_subsets:
  - train-clean-100
max_frames: 256
sample_rate: 22050

# Training stage 1 (ACG) — §3
stage1:
  iterations: 100000
  lr: 1.0e-5
  batch_size: 64           # §7: batch=64
  # No scheduler in Stage 1

# Training stage 2 (Rano) — §3
stage2:
  iterations: 200000
  lr: 1.0e-5
  batch_size: 4            # Reduced physical batch size to avoid OOM
  accumulate_steps: 4      # Accumulate 4 steps (effective batch size = 16)
  lr_step: 50000           # §7: StepLR step_size=50000
  distance_threshold: 0.5  # §7: d=0.5 (L2)

# Checkpoints
asv_checkpoint: checkpoints/asv.pt
acg_checkpoint: checkpoints/acg/acg_final.pt
output_dir: checkpoints/rano
log_dir: logs/rano
num_workers: 4
